  <style>
    :root {
      --primary:          #078DE7;
      --white:            #ffffff;
      --black:            #10131D;
      --g800:             #404D58;
      --lightPrimary600:  #639FFB;
      --lightNeutral200:  #F8F9FB;
      --lightNeutral300:  #EEF0F5;
      --lightNeutral500:  #8E94A3;
      --lightNeutral700:  #2C333C;
      --buttonHover:      #1B4DE9;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Rubik', sans-serif; background: #F0F2F5; min-height: 100vh; }

    .preview-wrapper { display: flex; flex-direction: column; gap: 48px; padding: 0 0 100px; }
    .preview-label {
      font-family: 'Rubik', sans-serif; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em; color: #8E94A3;
      padding: 12px 20px 6px; background: #F0F2F5;
      position: sticky; top: 0; z-index: 2000;
    }
    .device-frame { background: #fff; overflow: hidden; box-shadow: 0 2px 24px rgba(0,0,0,.08); }
    .device-frame.desktop { width: 100%; }
    .device-frame.mobile  { width: 375px; margin: 0 auto; border-radius: 12px; }
    .page-body        { padding: 80px 5% 40px; min-height: 300px; background: #f7f8fa; display: flex; align-items: center; justify-content: center; color: #C7CBD7; font-size: 13px; font-weight: 500; letter-spacing: .05em; }
    .page-body-mobile { padding: 20px 5% 110px; min-height: 260px; background: #f7f8fa; display: flex; align-items: center; justify-content: center; color: #C7CBD7; font-size: 13px; }

    /* NAVBAR */
    .navbar { background: #fff; display: flex; flex-direction: column; width: 100%; flex-shrink: 0; position: relative; z-index: 1000; top: 0; }
    .navbar--dark  { background: #000; }
    .navbar--light { background: #fff; }
    .navContainer  { padding: 0 5%; z-index: 10; }
    .toolBar       { display: flex; justify-content: space-between; align-items: center; height: 4.5rem; margin: 0 auto; max-width: 67.5rem; }
    .rightSideContainer { display: flex; align-items: center; justify-content: flex-start; gap: .8rem; flex: 1; }
    .leftSideContainer  { display: flex; align-items: center; justify-content: flex-end;  gap: 1rem;  flex: 1; }

    /* LOGO */
    .logo-wrap { cursor: pointer; display: flex; align-items: center; }
    .logo-svg     { height: 2.25rem; display: block; }\n    .logo-svg-ar  { width: 3.75rem; }\n    .logo-svg-en  { width: 7.5rem; }

    /* NAV BUTTONS */
    .flexContainer { flex-grow: 1; display: flex; gap: 1.25rem; margin-right: 4.5rem; }
    .navButton {
      display: flex; align-items: center; border-radius: 0; background: none; border: none;
      cursor: pointer; padding: 0; font-family: 'Rubik', sans-serif; transition: all .2s ease-out;
    }
    .navButton .content      { display: flex; flex-direction: column; align-items: flex-start; }
    .navButton .labelContainer { display: flex; align-items: center; gap: .5rem; }
    .navButton .nav-icon     { width: 20px; height: 20px; filter: opacity(.5); transition: all .2s ease-out; }
    .navButton .label        { color: #fff; font-weight: 400; font-size: 14px; padding: 0 .075rem; text-transform: none; transition: all .2s ease-out; white-space: nowrap; }
    .navButton .indicator    { opacity: 0; width: 27px; height: 3px; background: #fff; border-radius: 10px; margin-top: 4px; transition: all .2s ease-out; }
    .navButton:hover .nav-icon  { filter: none; }
    .navButton:hover .label     { font-weight: 700; padding: 0; }
    .navButton:hover .indicator { opacity: .5; margin-right: 2rem; }
    .navButton[data-selected="true"] .nav-icon  { filter: none; }
    .navButton[data-selected="true"] .label     { font-weight: 700; padding: 0; }
    .navButton[data-selected="true"] .indicator { opacity: 1; margin-right: 2rem; }

    /* CREATE CONTRACT */
    .create-contract-btn {
      display: flex; justify-content: center; align-items: center;
      padding: 12px 24px; background: var(--lightNeutral200); border-radius: 100px;
      text-decoration: none; border: none; cursor: pointer; transition: all .2s ease-out;
    }
    .create-contract-btn p { font-family: 'Rubik'; font-weight: 500; font-size: 14px; line-height: 14px; color: #10131d; margin: 0; white-space: nowrap; transition: all .2s ease-out; }
    .create-contract-btn:hover           { background: var(--buttonHover); }
    .create-contract-btn:hover p         { color: #fff; }

    /* NOTIFICATION */
    .notification-box {
      display: flex; justify-content: center; align-items: center;
      background: var(--lightNeutral700); border-radius: 20px;
      width: 40px; height: 40px; padding: 12px; cursor: default; position: relative; z-index: 2;
      flex-shrink: 0;
    }
    .notification-box svg { width: 22px; height: 22px; }
    .unseen-dot {
      position: absolute; background: var(--lightPrimary600); box-sizing: content-box;
      width: 9px; height: 9px; border: 2px solid var(--lightNeutral700); border-radius: 50%;
      top: 6px; right: 8px; transition: border-color .15s ease;
    }

    /* PROFILE */
    .profile-box { display: flex; align-items: center; cursor: pointer; border-radius: 1.3rem; padding: 0.2rem 0.2rem; transition: background .15s ease; }
    .profile-box:hover { background: rgba(255,255,255,.1); }
    .avatar-container { position: relative; overflow: hidden; width: 40px; height: 40px; flex-shrink: 0; }
    .avatar-img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .profile-details { margin: 0 .5rem; min-width: 5rem; }
    .profile-details-wrapper { display: flex; flex-direction: column; align-items: flex-start; align-self: flex-start; }
    .profile-name   { color: #fff; font-size: 14px; font-weight: 500; margin: 0; line-height: normal; white-space: nowrap; }
    .profile-number { font-size: .75rem; line-height: 24px; color: var(--lightNeutral500); margin: 0; direction: ltr; }

    /* LANG PILL */
    .lang-pill {
      display: flex; align-items: center; gap: 6px; padding: 8px 12px; height: 40px;
      border: 1px solid #ebf4ff; border-radius: 100px; background: #f3f6fc;
      font-family: 'Rubik'; font-weight: 400; font-size: 14px; color: #050915;
      cursor: pointer; white-space: nowrap; transition: background .2s ease;
    }
    .lang-pill:hover { background: #e8eef8; }
    .lang-icon { width: 24px; height: 24px; flex-shrink: 0; }

    /* CONTACT BTN */
    .contact-btn {
      display: flex; align-items: center; padding: 0 16px; gap: 8px; height: 40px;
      background: #eef0f5; border-radius: 100px; text-decoration: none; cursor: pointer;
      border: none; transition: background .2s ease;
    }
    .contact-btn:hover { background: #e3e5eb; }
    .contact-btn .whatsapp-link { display: flex; align-items: center; gap: 8px; }
    .wa-icon { width: 20px; height: 20px; flex-shrink: 0; }
    .contact-btn p { margin: 0; font-family: 'Rubik'; font-weight: 600; font-size: 14px; color: #10131d; white-space: nowrap; direction: ltr; }

    /* FOOTER NAV */
    .footerMenu {
      display: flex; width: 100%; align-items: center; background: #fff;
      box-shadow: 0 -1px 10px rgba(0,0,0,.05); height: 88px; position: relative; z-index: 100;
    }
    .footerItems { display: flex; flex: 1; justify-content: center; align-items: center; position: relative; cursor: pointer; height: 100%; }
    .footerItems .item-selected::before { position: absolute; content: " "; top: -1.1rem; width: 60%; height: 2px; background: #078de7; }
    .footerItem { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 4px; }
    .footerItem svg { width: 20px; height: 20px; }
    .footerItem p { font-family: 'Rubik'; font-size: 0.875rem; line-height: normal; margin: 0; font-weight: 400; }
    .footerItem p.active   { color: #0D44AD; }
    .footerItem p.inactive { color: #9FA6AB; }
    .footer-plus { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: var(--primary); border-radius: 50%; box-shadow: 0 4px 12px rgba(7,141,231,.4); }
    .footer-plus svg { width: 22px; height: 22px; }

    /* NOTIFICATION PANEL */
    .notif-panel {
      position: absolute; top: 72px; right: 5%; width: 360px; background: #fff;
      border-radius: 12px; box-shadow: 0 8px 40px rgba(0,0,0,.14); z-index: 2000;
      overflow: hidden; transform-origin: top right; animation: popIn .18s ease-out;
    }
    @keyframes popIn { from { opacity:0; transform: scale(.95) translateY(-4px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .notif-panel-header { padding: 16px 20px; border-bottom: 1px solid #f0f2f5; font-weight: 600; font-size: 15px; color: #10131D; display: flex; justify-content: space-between; align-items: center; }
    .notif-panel-header span.mark-read { font-size: 12px; color: var(--primary); cursor: pointer; font-weight: 400; }
    .notif-item { display: flex; gap: 12px; padding: 14px 20px; border-bottom: 1px solid #f8f9fb; cursor: pointer; transition: background .1s; }
    .notif-item:hover { background: #f8f9fb; }
    .notif-item.unread { background: #f3f7fd; }
    .notif-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--lightPrimary600); flex-shrink: 0; margin-top: 6px; }
    .notif-dot.read { background: transparent; }
    .notif-text { font-size: 13px; line-height: 1.5; color: #10131D; }
    .notif-time { font-size: 11px; color: #8E94A3; margin-top: 3px; }

    /* CONTROLS */
    .controls {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: #10131D; border-radius: 100px; padding: 8px 12px;
      display: flex; gap: 6px; z-index: 9999; box-shadow: 0 4px 20px rgba(0,0,0,.3);
    }
    .controls button {
      font-family: 'Rubik'; font-size: 12px; font-weight: 500; padding: 6px 14px;
      border-radius: 100px; border: none; cursor: pointer; transition: all .15s ease;
      background: rgba(255,255,255,.1); color: #fff;
    }
    .controls button.active { background: #fff; color: #10131D; }
    .controls button:hover:not(.active) { background: rgba(255,255,255,.2); }
  </style>
</head>
<body>

<div class="controls">
  <button id="btn-auth"  class="active" onclick="setMode('auth')">Authenticated</button>
  <button id="btn-guest"                onclick="setMode('guest')">Logged Out</button>
  <button id="btn-ar"                   onclick="setLang('ar')">AR</button>
  <button id="btn-en"   class="active"  onclick="setLang('en')">EN</button>
</div>

<div class="preview-wrapper">

  <!-- ── DESKTOP ──────────────────────────────────────────────── -->
  <div class="preview-section">
    <div class="preview-label">Desktop — 1280px+</div>
    <div class="device-frame desktop">

      <nav id="navbar-desktop" class="navbar navbar--dark">
        <div class="navContainer">

            <!-- RIGHT: Logo + Nav Items -->

                <!-- White logos (auth) -->
                <svg id="logo-white-ar-el" class="logo-svg logo-svg-ar"><use href="#logo-white-ar"/></svg>
                <svg id="logo-white-en-el" class="logo-svg logo-svg-en" style="display:none"><use href="#logo-white-en"/></svg>
                <!-- Blue logos (guest) -->
                <svg id="logo-blue-ar-el"  class="logo-svg logo-svg-ar" style="display:none"><use href="#logo-blue-ar"/></svg>
                <svg id="logo-blue-en-el"  class="logo-svg logo-svg-en" style="display:none"><use href="#logo-blue-en"/></svg>
              </div>

              <div id="nav-items-desktop" class="flexContainer">
                <button class="navButton" data-selected="true" onclick="selectNav(this)">
                  <div class="content">
                    <div class="labelContainer">
                      <svg class="nav-icon"><use href="#icon-contracts-nav"/></svg>
                      <span class="label" id="label-contracts">Transactions</span>
                    </div>
                    <div class="indicator"></div>
                  </div>
                </button>
                <button class="navButton" data-selected="false" onclick="selectNav(this)">
                  <div class="content">
                    <div class="labelContainer">
                      <svg class="nav-icon"><use href="#icon-wallet-nav"/></svg>
                      <span class="label" id="label-wallet">Balance</span>
                    </div>
                    <div class="indicator"></div>
                  </div>
                </button>
              </div>
            </div>

            <!-- LEFT -->
            <div class="leftSideContainer">

              <!-- AUTH -->
              <div id="auth-actions" style="display:flex;align-items:center;gap:1rem;">
                <button class="create-contract-btn">
                  <p id="label-create">Start new transaction</p>
                </button>

                <div class="notification-box" id="notif-btn">
                  <svg><use href="#icon-notification"/></svg>
                  <div class="unseen-dot" id="notif-dot"></div>
                </div>

                <div class="notif-panel" id="notif-panel" style="display:none;">
                  <div class="notif-panel-header">
                    <span id="notif-title">Notifications</span>
                    <span class="mark-read" onclick="clearNotifs()">Mark all read</span>
                  </div>
                  <div id="notif-list"></div>
                </div>

                <div class="profile-box">
                  <div class="avatar-container">
                    <img class="avatar-img" id="avatar-img"
                      src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='20' fill='%232C333C'/%3E%3Ccircle cx='20' cy='16' r='7' fill='%238E94A3'/%3E%3Cellipse cx='20' cy='34' rx='12' ry='9' fill='%238E94A3'/%3E%3C/svg%3E"
                      alt="profile" />
                  </div>
                  <div class="profile-details">
                    <div class="profile-details-wrapper">
                      <p class="profile-name"   id="profile-name"></p>
                      <p class="profile-number" id="profile-number"></p>
                    </div>
                  </div>
                </div>
              </div>

              <!-- GUEST -->
              <div id="guest-actions" style="display:none;align-items:center;gap:1rem;">
                <button class="lang-pill" onclick="toggleLangFromBtn()">
                  <span id="lang-label">العربية</span>
                  <svg class="lang-icon"><use href="#icon-language"/></svg>
                </button>
                <a class="contact-btn" href="#" target="_blank">
                  <div class="whatsapp-link">
                    <svg class="wa-icon"><use href="#icon-whatsapp"/></svg>
                    <p id="contact-label">Contact us</p>
                  </div>
                </a>
              </div>

            </div>
          </div>
        </div>
      </nav>

      <div class="page-body">Page content area</div>
    </div>
  </div>


  <!-- ── MOBILE AUTH ───────────────────────────────────────────── -->
  <div class="preview-section">
    <div class="preview-label">Mobile — 375px · Authenticated (bottom nav)</div>
    <div class="device-frame mobile">
      <div class="page-body-mobile">Page content area</div>

      <div class="footerMenu">
        <!-- Home -->
        <div class="footerItems" onclick="selectFooter(0)">
          <div class="footerItem item-not-selected" id="fi-0">
            <svg id="fi-icon-0"><use id="fi-icon-use-0" href="#icon-home"/></svg>
            <p class="inactive" id="fi-label-0">Home</p>
          </div>
        </div>
        <!-- Contracts -->
        <div class="footerItems" onclick="selectFooter(1)">
          <div class="footerItem item-not-selected" id="fi-1">
            <svg id="fi-icon-1"><use id="fi-icon-use-1" href="#icon-contracts"/></svg>
            <p class="inactive" id="fi-label-1">Transactions</p>
          </div>
        </div>
        <!-- Plus -->
        <div class="footerItems">
          <div class="footerItem">
            <div class="footer-plus">
              <svg viewBox="0 0 22 22" fill="none">
                <path d="M11 4v14M4 11h14" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </div>
          </div>
        </div>
        <!-- Wallet -->
        <div class="footerItems" onclick="selectFooter(3)">
          <div class="footerItem item-not-selected" id="fi-3">
            <svg id="fi-icon-3"><use id="fi-icon-use-3" href="#icon-balance"/></svg>
            <p class="inactive" id="fi-label-3">Wallet</p>
          </div>
        </div>
        <!-- Profile -->
        <div class="footerItems" onclick="selectFooter(4)">
          <div class="footerItem item-not-selected" id="fi-4">
            <svg id="fi-icon-4"><use id="fi-icon-use-4" href="#icon-profile"/></svg>
            <p class="inactive" id="fi-label-4">Account</p>
          </div>
        </div>
      </div>
    </div>
  </div>


  <!-- ── MOBILE GUEST ──────────────────────────────────────────── -->
  <div class="preview-section">
    <div class="preview-label">Mobile — 375px · Logged Out</div>
    <div class="device-frame mobile">
      <nav class="navbar navbar--light" style="background:transparent;box-shadow:none;">
        <div class="navContainer" style="padding:0 6%;">
          <div class="toolBar" style="height:3.5rem;max-width:none;">
            <div class="rightSideContainer">
              <svg id="mobile-logo" class="logo-svg logo-svg-ar"><use href="#logo-blue-ar"/></svg>
            </div>
            <div class="leftSideContainer" style="gap:.75rem;">
              <button class="lang-pill" style="padding:6px 10px;height:36px;font-size:13px;" onclick="toggleLangFromBtn()">
                <span id="lang-label-mobile">العربية</span>
                <svg class="lang-icon" style="width:20px;height:20px;"><use href="#icon-language"/></svg>
              </button>
            </div>
          </div>
        </div>
      </nav>
      <div class="page-body-mobile" style="min-height:200px;">Page content area</div>
    </div>
  </div>

<script>
  // ============================================================
  // DESIGNER CONSTANTS — tweak these to test different states
  // ============================================================

  let IS_AUTHENTICATED = true;    // Toggle via buttons, or change default here

  // User info
  const USER_NAME       = "Ahmed Al-Rashidi";
  const USER_PHONE      = "+966501234567";
  const USER_AVATAR_URL = "";     // URL for profile photo, leave empty for placeholder

  // Notifications
  const HAS_NOTIFICATIONS = true;
  const NOTIFICATIONS = [
    { text: "Your transaction #TXN-4821 has been confirmed by the seller.", time: "2 min ago",   unread: true  },
    { text: "Payment of SAR 1,200 received for transaction #TXN-4780.",    time: "1 hour ago",  unread: true  },
    { text: "New transaction request from Sara Al-Otaibi.",                 time: "3 hours ago", unread: true  },
    { text: "Transaction #TXN-4750 was completed successfully.",            time: "Yesterday",   unread: false },
  ];

  // Active nav (desktop): 0 = Transactions, 1 = Wallet
  const ACTIVE_NAV = 0;

  // Active footer tab (mobile): 0=Home 1=Contracts 3=Wallet 4=Profile
  let activeFooter = 1;

  let LANG = "en";

  // ============================================================

  const LABELS = {
    en: { contracts:"Transactions", wallet:"Balance", create:"Start new transaction",
          contact:"Contact us", langSwitch:"العربية", notifications:"Notifications",
          markRead:"Mark all read", home:"Home", footerContracts:"Transactions",
          footerWallet:"Wallet", footerProfile:"Account" },
    ar: { contracts:"المعاملات", wallet:"الرصيد", create:"بدء معاملة جديدة",
          contact:"تواصل معنا", langSwitch:"English", notifications:"الإشعارات",
          markRead:"تحديد الكل كمقروء", home:"الرئيسية", footerContracts:"المعاملات",
          footerWallet:"الرصيد", footerProfile:"الحساب" }
  };

  const ICON_MAP = {
    0: { normal:"#icon-home",      active:"#icon-home-active"      },
    1: { normal:"#icon-contracts", active:"#icon-contracts-active" },
    3: { normal:"#icon-balance",   active:"#icon-balance-active"   },
    4: { normal:"#icon-profile",   active:"#icon-profile-active"   },
  };

  const LOGO_IDS = ['logo-white-ar-el','logo-white-en-el','logo-blue-ar-el','logo-blue-en-el'];

  function t(k) { return LABELS[LANG][k] || k; }

  function applyLabels() {
    document.documentElement.lang = LANG;
    document.documentElement.dir  = LANG === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('label-contracts').textContent = t('contracts');
    document.getElementById('label-wallet').textContent    = t('wallet');
    document.getElementById('label-create').textContent    = t('create');
    document.getElementById('contact-label').textContent   = t('contact');
    document.getElementById('lang-label').textContent      = t('langSwitch');
    document.getElementById('lang-label-mobile').textContent = t('langSwitch');
    document.getElementById('notif-title').textContent     = t('notifications');
    document.getElementById('fi-label-0').textContent      = t('home');
    document.getElementById('fi-label-1').textContent      = t('footerContracts');
    document.getElementById('fi-label-3').textContent      = t('footerWallet');
    document.getElementById('fi-label-4').textContent      = t('footerProfile');
  }

  function applyLogos() {
    const isAR   = LANG === 'ar';
    const isAuth = IS_AUTHENTICATED;
    // Desktop logos
    document.getElementById('logo-white-ar-el').style.display = (isAuth && isAR)  ? '' : 'none';
    document.getElementById('logo-white-en-el').style.display = (isAuth && !isAR) ? '' : 'none';
    document.getElementById('logo-blue-ar-el').style.display  = (!isAuth && isAR) ? '' : 'none';
    document.getElementById('logo-blue-en-el').style.display  = (!isAuth && !isAR)? '' : 'none';
    // Mobile guest logo
    const mbl = document.getElementById('mobile-logo');
    if (mbl) {
      mbl.querySelector('use').setAttribute('href', isAR ? '#logo-blue-ar' : '#logo-blue-en');
      mbl.classList.toggle('logo-svg-ar', isAR);
      mbl.classList.toggle('logo-svg-en', !isAR);
    }
  }

  function applyAuthState() {
    const navbar     = document.getElementById('navbar-desktop');
    const authActs   = document.getElementById('auth-actions');
    const guestActs  = document.getElementById('guest-actions');
    const navItems   = document.getElementById('nav-items-desktop');

    navbar.classList.toggle('navbar--dark',  IS_AUTHENTICATED);
    navbar.classList.toggle('navbar--light', !IS_AUTHENTICATED);
    authActs.style.display  = IS_AUTHENTICATED ? 'flex' : 'none';
    guestActs.style.display = IS_AUTHENTICATED ? 'none' : 'flex';
    navItems.style.display  = IS_AUTHENTICATED ? 'flex' : 'none';
    applyLogos();
  }

  function applyUserInfo() {
    const name = USER_NAME.split(' ').slice(0,2).join(' ');
    document.getElementById('profile-name').textContent   = name;
    document.getElementById('profile-number').textContent = formatPhone(USER_PHONE);
    if (USER_AVATAR_URL) document.getElementById('avatar-img').src = USER_AVATAR_URL;
  }

  function formatPhone(p) {
    const s = p.replace(/^\+966/,'0');
    return s.replace(/(\d{4})(\d{3})(\d{4})/,'$1 $2 $3');
  }

  function applyNotifications() {
    const unreadCount = NOTIFICATIONS.filter(n => n.unread).length;
    document.getElementById('notif-dot').style.display = (HAS_NOTIFICATIONS && unreadCount > 0) ? '' : 'none';
    const list = document.getElementById('notif-list');
    list.innerHTML = NOTIFICATIONS.map(n => `
      <div class="notif-item ${n.unread ? 'unread' : ''}">
        <div class="notif-dot ${n.unread ? '' : 'read'}"></div>
        <div><div class="notif-text">${n.text}</div><div class="notif-time">${n.time}</div></div>
      </div>`).join('');
  }

  function applyActiveNav() {
    document.querySelectorAll('#nav-items-desktop .navButton').forEach((b,i) => {
      b.setAttribute('data-selected', i === ACTIVE_NAV ? 'true' : 'false');
    });
  }

  // Footer
  function selectFooter(idx) {
    [0,1,3,4].forEach(i => {
      const item  = document.getElementById(`fi-${i}`);
      const use   = document.getElementById(`fi-icon-use-${i}`);
      const label = document.getElementById(`fi-label-${i}`);
      const isActive = i === idx;
      if (item)  item.className  = `footerItem ${isActive ? 'item-selected' : 'item-not-selected'}`;
      if (use)   use.setAttribute('href', isActive ? ICON_MAP[i].active : ICON_MAP[i].normal);
      if (label) label.className = isActive ? 'active' : 'inactive';
    });
    activeFooter = idx;
  }

  // Notification panel
  let notifOpen = false;
  function toggleNotif() {
    notifOpen = !notifOpen;
    document.getElementById('notif-panel').style.display = notifOpen ? '' : 'none';
    document.getElementById('notif-btn').classList.toggle('active', notifOpen);
  }
  function clearNotifs() {
    document.querySelectorAll('#notif-list .notif-item').forEach(item => {
      item.classList.remove('unread');
      const dot = item.querySelector('.notif-dot'); if (dot) dot.classList.add('read');
    });
    document.getElementById('notif-dot').style.display = 'none';
  }
  document.addEventListener('click', e => {
    if (!notifOpen) return;
    const panel = document.getElementById('notif-panel');
    const btn   = document.getElementById('notif-btn');
    if (!panel.contains(e.target) && !btn.contains(e.target)) {
      panel.style.display = 'none';
      btn.classList.remove('active');
      notifOpen = false;
    }
  });

  function selectNav(btn) {
    btn.closest('.flexContainer').querySelectorAll('.navButton').forEach(b => b.setAttribute('data-selected','false'));
    btn.setAttribute('data-selected','true');
  }

  function setMode(mode) {
    IS_AUTHENTICATED = mode === 'auth';
    document.getElementById('btn-auth').classList.toggle('active',  IS_AUTHENTICATED);
    document.getElementById('btn-guest').classList.toggle('active', !IS_AUTHENTICATED);
    applyAuthState();
  }

  function setLang(lang) {
    LANG = lang;
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-ar').classList.toggle('active', lang === 'ar');
    applyLabels();
    applyLogos();
  }

  function toggleLangFromBtn() { setLang(LANG === 'en' ? 'ar' : 'en'); }

  // Init
  applyLabels();
  applyAuthState();
  applyUserInfo();
  applyNotifications();
  applyActiveNav();
  selectFooter(activeFooter);
</script>
</body>
</html>
